# =============================================================================
# ИДЕАЛЬНЫЙ БАЗОВЫЙ КОНФИГ HYPRLAND (NVIDIA + RU/EN + РАБОЧИЕ СТОЛЫ)
# =============================================================================
env = QT_QPA_PLATFORM,wayland;xcb
# --- МОНИТОР ---
# Автоматическое определение разрешения и частоты обновления
monitor=,preferred,auto,1

# --- АВТОЗАПУСК ---
# Запуск утилиты для обоев (swww), панели (waybar) и уведомлений (dunst)
exec-once = sleep 2 && swww-daemon
exec-once = waybar
exec-once = dunst

# --- НАСТРОЙКИ КЛАВИАТУРЫ И МЫШИ (РАСКЛАДКА) ---
input {
    kb_layout = us,ru
    kb_options = grp:win_space_toggle # Переключение по Win + Space
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0 # -1.0 - 1.0, 0 означает без изменений
}

# --- ВИЗУАЛ (РАМКИ, СКРУГЛЕНИЯ, РАЗМЫТИЕ) ---
general {
    gaps_in = 5       # Зазоры между окнами
    gaps_out = 10     # Зазоры между окнами и краем экрана
    border_size = 2
    col.active_border = rgba(33cceeee) rgba(00ff99ee) 45deg # Красивый градиент
    col.inactive_border = rgba(595959aa)
    layout = dwindle  # Умное плиточное расположение окон
}

decoration {
    rounding = 5     # Скругление углов окон
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- АНИМАЦИИ ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, 
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default # Плавный свайп рабочих столов
}

# --- ГОРЯЧИЕ КЛАВИШИ (ГЛАВНЫЕ ПРОГРАММЫ) ---
$mainMod = SUPER # Кнопка Windows

bind = $mainMod, Return, exec, kitty                 # Win + Q - Терминал
bind = $mainMod, Q, killactive,                 # Win + C - Закрыть окно
bind = $mainMod, M, exit,                       # Win + M - Выйти из Hyprland на экран логина
bind = $mainMod, V, togglefloating,             # Win + V - Сделать окно плавающим
bind = $mainMod, D, exec, rofi -show drun       # Win + R - Меню запуска (если настроишь Rofi)

# ТВОЙ СОФТ ПО КНОПКАМ:
bind = $mainMod, B, exec, google-chrome         # Win + B - Браузер
bind = $mainMod, T, exec, telegram-desktop       # Win + T - Телеграм
bind = $mainMod, C, exec, vscodium               # Win + N - Код (VScodium)

# --- УПРАВЛЕНИЕ ОКНАМИ (ФОКУС МЫШИ/КЛАВИАТУРЫ) ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- РАБОЧИЕ СТОЛЫ (WORKSPACES) ---
# Переключение на рабочий стол (Win + Цифра от 1 до 9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Перенос активного окна на другой рабочий стол (Win + Shift + Цифра)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Прокрутка рабочих столов колесиком мыши (Win + Скролл)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Перетаскивание окон мыканьем (Win + ЛКМ / ПКМ)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Быстрая блокировка экрана и меню питания
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, X, exec, wlogout -p layer-shell

# Выбор обоев
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-selector.sh
# Скришоты
bind = , Print, exec, XDG_CURRENT_DESKTOP=sway flameshot gui
bind = $mainMod, Print, exec, XDG_CURRENT_DESKTOP=sway flameshot full -p ~/Pictures/Screenshots
# Регулировка громкости (Fn + F2 и Fn + F3)
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 5%+

# Регулировка яркости экрана (Fn + F5 и Fn + F6)
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
