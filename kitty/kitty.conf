# =============================================================================
# КРАСИВЫЙ КОНФИГ KITTY В СТИЛЕ CATPPUCCIN MOCHA С ПРОЗРАЧНОСТЬЮ
# =============================================================================

# --- Шрифты ---
font_family      Lexend
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# --- Настройки Окна и Прозрачности ---
# Значение 0.75 делает окно мягко прозрачным. 1.0 — полностью глухое.
background_opacity         1

# Включаем размытие заднего фона (работает в Hyprland)
background_blur            1

# Отступы внутри терминала, чтобы текст не прилипал к краям экрана
window_padding_width       12

# Убираем стандартную рамку окна, оставляя чистый интерфейс
hide_window_decorations    yes
confirm_os_window_close    0

# --- Форма и анимация курсора ---
cursor_shape               beam
cursor_blink_interval      0.5

# =============================================================================
# ЦВЕТОВАЯ ПАЛИТРА CATPPUCCIN MOCHA
# =============================================================================
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Цвет курсора
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# Цвета URL ссылок при наведении
url_color               #F5E0DC

# Стилизация вкладок (если открываешь несколько табов внутри Kitty)
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Цвета рамки (если окон несколько)
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# --- Основная палитра ANSI цветов ---

# Black (Черный)
color0 #45475A
color8 #585B70

# Red (Красный)
color1 #F38BA8
color9 #F38BA8

# Green (Зеленый)
color2  #A6E3A1
color10 #A6E3A1

# Yellow (Желтый)
color3  #F9E2AF
color11 #F9E2AF

# Blue (Синий)
color4  #89B4FA
color12 #89B4FA

# Magenta (Пурпурный)
color5  #CBA6F7
color13 #CBA6F7

# Cyan (Бирюзовый)
color6  #94E2D5
color14 #94E2D5

# White (Белый)
color7  #BAC2DE
color15 #A6ADC8
